name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly check — catches breakage from dependency updates
    - cron: "0 6 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - run: cargo clippy -- -D warnings
